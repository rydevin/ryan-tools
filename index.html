<style>

-size:22px;margin:8px 0 12px}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:4px;z-index:20}.navbtn{border:0;background:transparent;color:var(--muted);border-radius:14px;padding:8px 12px;min-width:70px;font-size:12px;font-weight:800}.navbtn.active{background:#e7f4f8;color:var(--accent)}.navbtn .ico{display:block;font-size:21px;margin-bottom:2px}.topbar{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.9);backdrop-filter:blur(18px);padding:12px 18px;border-bottom:1px solid rgba(217,226,236,.65)}.back{border:0;background:transparent;color:var(--accent);font-weight:900;padding:8px 0}.day-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.date-badge{background:#102A43;color:#fff;border-radius:18px;padding:10px 12px;text-align:center;min-width:70px}.date-badge .mo{font-size:12px;font-weight:800;opacity:.7}.date-badge .da{font-size:26px;font-weight:950}.timeline{position:relative;padding-left:16px}.timeline:before{content:"";position:absolute;left:3px;top:8px;bottom:8px;width:2px;background:var(--line)}.event{position:relative;margin:0 0 12px;padding:13px 14px;border:1px solid var(--line);background:#fff;border-radius:16px}.event:before{content:"";position:absolute;left:-18px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--accent2);border:3px solid var(--bg)}.event-time{font-size:13px;font-weight:900;color:var(--accent)}.fab{position:fixed;right:18px;bottom:98px;width:58px;height:58px;border-radius:50%;border:0;background:linear-gradient(145deg,#1B4965,#62B6CB);color:#fff;font-size:30px;box-shadow:0 14px 28px rgba(27,73,101,.35);z-index:30}.modal{position:fixed;inset:0;background:rgba(7,20,33,.48);z-index:50;display:none;align-items:flex-end}.modal.show{display:flex}.sheet{background:#fff;width:100%;max-width:780px;margin:0 auto;border-radius:28px 28px 0 0;padding:18px;max-height:88vh;overflow:auto}.field{margin:13px 0}.field label{display:block;font-size:13px;color:var(--muted);font-weight:850;margin-bottom:6px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:15px;padding:13px;background:#fff;color:var(--ink)}textarea{min-height:100px;resize:vertical}.actions{display:flex;gap:10px}.actions>*{flex:1}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.photo-grid img{width:100%;height:90px;object-fit:cover;border-radius:12px}.danger{color:#b42318}.empty{text-align:center;color:var(--muted);padding:26px 12px}.search{position:relative}.search input{padding-left:42px}.search:before{content:"🔍";position:absolute;left:14px;top:12px}@media (prefers-color-scheme:dark){:root{--bg:#071421;--card:#0f2133;--ink:#eef6ff;--muted:#9fb3c8;--line:#243b53;--shadow:0 12px 30px rgba(0,0,0,.26)}.tile,.item,.event,.sheet,input,textarea,select{background:#0f2133;color:var(--ink)}.bottom{background:rgba(15,33,51,.92)}.topbar{background:rgba(7,20,33,.9)}.btn.secondary{background:#243b53;color:#eef6ff}.event:before{border-color:var(--bg)}}

<body><div id="app"></div><script>
(function(){
const KEY='waypoint_v222_data';
const defaultTrip={trip:{name:'England Adventure 2026',start:'2026-07-06',end:'2026-08-07',privacy:'Local device only'},days:[
['2026-07-06','London','Arrive in London',[['Afternoon','Arrive, settle in near Victoria Station','travel']]],['2026-07-07','London','London exploring',[['Morning','Classic London walk','activity']]],['2026-07-08','London','London day',[]],['2026-07-09','London','Warner Bros. Studio Tour',[['Day','Harry Potter Studio Tour from Watford Junction','ticket']]],['2026-07-10','London','London final day',[]],['2026-07-11','Cambridge','Travel to Cambridge',[['Afternoon','Punting or riverside walk','activity']]],['2026-07-12','Cambridge','Cambridge',[['Day','Colleges, bikes, bridges, and Sunday roast option','activity']]],['2026-07-13','York',"Elizabeth's Birthday in York",[['Afternoon','Arrive in York and explore historic center','travel'],['Evening','Birthday dinner','restaurant']]],['2026-07-14','York','York',[['Day','York Minster, Shambles, city walls','activity']]],['2026-07-15','York','York extra night',[]],['2026-07-16','Whitby','Whitby',[['Day','Whitby Abbey and seaside exploring','activity']]],['2026-07-17','Yorkshire Dales','Yorkshire Dales begins',[['Day','Drive into the Dales and settle in','travel']]],['2026-07-18','Yorkshire Dales','Dales adventure',[]],['2026-07-19','Yorkshire Dales','Dales Sunday', [['Midday','Sunday roast option','restaurant']]],['2026-07-20','Yorkshire Dales','Dales hikes and villages',[]],['2026-07-21','Yorkshire Dales','Dales hikes and villages',[]],['2026-07-22','Yorkshire Dales','Dales hikes and villages',[]],['2026-07-23','Yorkshire Dales','Dales final full day',[]],['2026-07-24','Yorkshire Dales','Dales wrap-up',[]],['2026-07-25','Cotswolds','Travel to Cotswolds',[]],['2026-07-26','Cotswolds','Cotswolds Sunday',[]],['2026-07-27','Cotswolds','Cotswolds villages',[]],['2026-07-28','Cotswolds','Cotswolds walking day',[]],['2026-07-29','Cotswolds','Cotswolds',[]],['2026-07-30','Cotswolds','Cotswolds',[]],['2026-07-31','Cotswolds','Cotswolds final day',[]],['2026-08-01','Castle Combe','Travel to Castle Combe',[]],['2026-08-02','Castle Combe','Castle Combe',[]],['2026-08-03','Castle Combe','Castle Combe',[]],['2026-08-04','Castle Combe','Castle Combe final full day',[]],['2026-08-05','Castle Combe','Castle Combe wrap-up',[]],['2026-08-06','Winchester','Winchester', [['Day','Great Hall and St Catherine’s Hill','activity']]],['2026-08-07','London / Heathrow','Fly home', [['Day','Return home','flight']]]].map(x=>({date:x[0],place:x[1],title:x[2],activities:x[3].map(a=>({time:a[0],title:a[1],type:a[2]}))})),reservations:[],journals:[],places:[],favorites:[]};
let state={view:'home',selectedDate:null,modal:null,editing:null,search:''}; let data=load();
function clone(o){return JSON.parse(JSON.stringify(o))} function load(){try{let s=JSON.parse(localStorage.getItem(KEY)||'null'); if(!s)return clone(defaultTrip); return {...clone(defaultTrip),...s,trip:{...defaultTrip.trip,...(s.trip||{})},days:Array.isArray(s.days)&&s.days.length?s.days:clone(defaultTrip.days),reservations:Array.isArray(s.reservations)?s.reservations:[],journals:Array.isArray(s.journals)?s.journals:[]}}catch(e){return clone(defaultTrip)}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))} function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})} function longDate(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function todayDate(){let now=new Date().toISOString().slice(0,10),s=data.trip.start,e=data.trip.end,t=now<s?s:now>e?e:now;return dayFor(t)?t:data.days[0].date} function dayFor(date){return data.days.find(d=>d.date===date)||data.days[0]} function reservationsFor(date){return data.reservations.filter(r=>r.date===date).sort((a,b)=>(a.time||'').localeCompare(b.time||''))} function journalsFor(date){return data.journals.filter(j=>j.date===date)}
window.setView=function(v,opts={}){state={...state,view:v,...opts,modal:null,editing:null};render();scrollTo(0,0)}; function hero(t,s){return `<div class="hero"><div class="eyebrow">Waypoint</div><h1>${t}</h1><p>${s}</p></div>`} function nav(){return `<div class="bottom">${[['home','🏠','Home'],['days','📅','Days'],['reservations','🎟️','Reserve'],['journal','📷','Journal'],['settings','⚙️','Settings']].map(i=>`<button class="navbtn ${state.view===i[0]?'active':''}" onclick="setView('${i[0]}')"><span class="ico">${i[1]}</span>${i[2]}</button>`).join('')}</div>`}
function top(t){return `<div class="topbar"><button class="back" onclick="setView('home')">← Home</button></div><main class="content"><h1>${t}</h1></main>`} function shell(x){return `<div class="app">${x}${nav()}</div>${modal()}`}
function home(){let td=todayDate(),d=dayFor(td),res=reservationsFor(td),idx=data.days.indexOf(d)+1,upcoming=data.days.slice(Math.max(0,idx-1),Math.min(data.days.length,idx+6));return `${hero('Waypoint',data.trip.name)}<main class="content"><div class="card"><div class="row"><div><span class="pill">🇬🇧 England Adventure</span><h2 class="section-title">Today: ${d.place}</h2><div class="muted">${longDate(td)} · Day ${idx} of ${data.days.length}</div></div><button class="btn" onclick="setView('day',{selectedDate:'${td}'})">Open Today</button></div></div><div class="grid"><button class="tile" onclick="setView('days')">📅<b>Daily Timeline</b><span>See all 33 trip days, activities, reservations, and journal entries.</span></button><button class="tile" onclick="openAdd('reservation','${td}')">🍽️<b>Add Reservation</b><span>Date and time pickers with automatic day placement.</span></button><button class="tile" onclick="openAdd('journal','${td}')">📷<b>Add Journal</b><span>Notes, favorite memory, and photos.</span></button><button class="tile" onclick="setView('settings')">💾<b>Backup / Share</b><span>Export for Julie or restore a backup.</span></button></div><h2 class="section-title">Family Scavenger Hunts</h2><div class="grid"><button class="tile" onclick="location.href='Everley_Hunt_GALLERY.html'">👑<b>Everley's Hunt</b><span>Royal Treasure Hunter adventure.</span></button><button class="tile" onclick="location.href='Ethan_Hunt_GALLERY.html'">⚔️<b>Ethan's Hunt</b><span>England mission checklist.</span></button><button class="tile" onclick="location.href='Elizabeth_Hunt_GALLERY.html'">👸<b>Elizabeth's Hunt</b><span>England adventure hunt.</span></button><button class="tile" onclick="setView('days')">🗓️<b>Trip Days</b><span>Jump back to the daily timeline.</span></button></div><h2 class="section-title">Trip Timeline</h2><div class="list">${upcoming.map(x=>`<button class="item" onclick="setView('day',{selectedDate:'${x.date}'})"><div class="row"><div><div class="item-title">${fmtDate(x.date)} · ${x.place}</div><div class="muted">${x.title}</div></div><span>›</span></div></button>`).join('')}<button class="btn secondary" onclick="setView('days')">View Full Timeline</button></div><h2 class="section-title">Today's Reservations</h2><div class="list">${res.length?res.map(resCard).join(''):'<div class="empty">No reservations for today yet.</div>'}</div></main>`}
function days(){let q=(state.search||'').toLowerCase();return `${top('Daily Timeline')}<main class="content"><div class="search"><input placeholder="Search days, places, activities..." value="${esc(state.search)}" oninput="state.search=this.value;render()"></div><br><div class="list">${data.days.filter(d=>JSON.stringify(d).toLowerCase().includes(q)).map(d=>`<button class="item" onclick="setView('day',{selectedDate:'${d.date}'})"><div class="row"><div><div class="item-title">${fmtDate(d.date)} · ${d.place}</div><div class="muted">${d.title}</div></div><span>›</span></div></button>`).join('')}</div></main>`}
function dayView(date){let d=dayFor(date),res=reservationsFor(date),journals=journalsFor(date),events=[...(d.activities||[]).map(a=>({...a,kind:'activity'})),...res.map(r=>({time:r.time,title:r.name,type:r.type||'reservation',kind:'reservation',location:r.location,meta:r.confirmation?`Confirmation: ${r.confirmation}`:''}))].sort((a,b)=>(a.time||'').localeCompare(b.time||''));return `${top('Day Details')}<main class="content"><div class="card day-head"><div><span class="pill">${d.place}</span><h2 class="section-title">${d.title}</h2><div class="muted">${longDate(date)}</div></div><div class="date-badge"><div class="mo">${new Date(date+'T12:00').toLocaleDateString(undefined,{month:'short'})}</div><div class="da">${new Date(date+'T12:00').getDate()}</div></div></div><h2 class="section-title">Timeline</h2><div class="timeline">${events.length?events.map(e=>`<div class="event"><div class="event-time">${e.time||'Anytime'} · ${icon(e.type)} ${label(e.type)}</div><div class="item-title">${e.title}</div>${e.location?`<div class="muted">${e.location}</div>`:''}${e.meta?`<div class="muted">${e.meta}</div>`:''}</div>`).join(''):'<div class="empty">No timeline items yet.</div>'}</div><h2 class="section-title">Journal</h2><div class="list">${journals.length?journals.map(journalCard).join(''):'<div class="empty">No journal entries yet.</div>'}</div></main><button class="fab" onclick="openQuick('${date}')">+</button>`}
function reservations(){return `${top('Reservations')}<main class="content"><button class="btn" onclick="openAdd('reservation')">+ Add Reservation</button><br><br><div class="list">${data.reservations.length?data.reservations.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(resCard).join(''):'<div class="empty">No reservations yet.</div>'}</div></main>`} function journal(){return `${top('Travel Journal')}<main class="content"><button class="btn" onclick="openAdd('journal')">+ Add Journal Entry</button><br><br><div class="list">${data.journals.length?data.journals.sort((a,b)=>b.date.localeCompare(a.date)).map(journalCard).join(''):'<div class="empty">No journal entries yet.</div>'}</div></main>`}
function settings(){return `${top('Settings & Sharing')}<main class="content"><div class="card"><h2>Storage</h2><p class="muted">Your Waypoint data is stored on this device only unless you export and share a backup.</p><span class="pill">🔒 Local device only</span></div><div class="card"><h2>Share with Julie</h2><p class="muted">Export a backup, AirDrop or send it to Julie, then import it on her phone.</p><div class="actions"><button class="btn" onclick="exportData()">Export Backup</button><label class="btn secondary">Import<input type="file" accept="application/json" onchange="importData(event)" hidden></label></div></div><div class="card"><h2>Reset</h2><p class="muted">This only affects the device you are using now.</p><button class="btn secondary danger" onclick="resetData()">Reset Local Data</button></div></main>`}
function icon(t){return ({restaurant:'🍽️',hotel:'🏨',train:'🚆',flight:'✈️',ticket:'🎟️',parking:'🚗',fishing:'🎣',hike:'🥾',show:'🎭',activity:'📍',travel:'🚆',reservation:'🎟️',other:'📌'})[t]||'📌'} function label(t){return ({restaurant:'Restaurant',hotel:'Hotel',train:'Train',flight:'Flight',ticket:'Attraction',parking:'Parking',fishing:'Fishing',hike:'Hike',show:'Show',activity:'Activity',travel:'Travel',other:'Other'})[t]||'Reservation'}
function resCard(r){return `<div class="item"><div class="row"><div><div class="item-title">${icon(r.type)} ${esc(r.name)}</div><div class="muted">${fmtDate(r.date)} ${r.time?`· ${r.time}`:''}${r.location?` · ${esc(r.location)}`:''}</div>${r.confirmation?`<div class="muted">Confirmation: ${esc(r.confirmation)}</div>`:''}</div><button class="btn ghost" onclick="editReservation('${r.id}')">Edit</button></div></div>`} function journalCard(j){return `<div class="item"><div class="row"><div><div class="item-title">${fmtDate(j.date)} · ${esc(j.title||'Journal Entry')}</div><div class="muted">${esc((j.note||'').slice(0,95))}</div></div><button class="btn ghost" onclick="editJournal('${j.id}')">Edit</button></div>${j.photos&&j.photos.length?`<div class="photo-grid">${j.photos.slice(0,6).map(p=>`<img src="${p}">`).join('')}</div>`:''}</div>`}
window.openQuick=d=>{state.modal={type:'quick',date:d};render()}; window.openAdd=(type,date)=>{state.modal={type,date:date||todayDate()};state.editing=null;render()}; window.closeModal=()=>{state.modal=null;state.editing=null;render()}; window.editReservation=id=>{state.editing=data.reservations.find(r=>r.id===id);state.modal={type:'reservation',date:state.editing.date};render()}; window.editJournal=id=>{state.editing=data.journals.find(j=>j.id===id);state.modal={type:'journal',date:state.editing.date};render()};
function modal(){if(!state.modal)return''; if(state.modal.type==='quick')return `<div class="modal show"><div class="sheet"><h2>Add to ${fmtDate(state.modal.date)}</h2><div class="grid"><button class="tile" onclick="openAdd('reservation','${state.modal.date}')">🍽️<b>Reservation</b><span>Restaurant, hotel, tickets, parking.</span></button><button class="tile" onclick="openAdd('journal','${state.modal.date}')">📷<b>Journal</b><span>Entry with photos.</span></button></div><br><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`; return state.modal.type==='reservation'?reservationForm():journalForm()}
function reservationForm(){let r=state.editing||{date:state.modal.date,type:'restaurant'};return `<div class="modal show"><div class="sheet"><h2>${state.editing?'Edit':'Add'} Reservation</h2><div class="field"><label>Type</label><select id="resType"><option value="restaurant">🍽️ Restaurant</option><option value="hotel">🏨 Hotel</option><option value="train">🚆 Train</option><option value="flight">✈️ Flight</option><option value="ticket">🎟️ Attraction / Ticket</option><option value="parking">🚗 Parking</option><option value="fishing">🎣 Fishing</option><option value="hike">🥾 Hike</option><option value="show">🎭 Show</option><option value="other">📌 Other</option></select></div><div class="field"><label>Date</label><input id="resDate" type="date" value="${r.date||state.modal.date}" min="${data.trip.start}" max="${data.trip.end}"></div><div class="field"><label>Time</label><input id="resTime" type="time" value="${r.time||''}"></div><div class="field"><label>Name</label><input id="resName" placeholder="Restaurant, attraction, hotel..." value="${esc(r.name||'')}"></div><div class="field"><label>Location / Address</label><input id="resLoc" placeholder="Address or town" value="${esc(r.location||'')}"></div><div class="field"><label>Confirmation Number</label><input id="resConf" value="${esc(r.confirmation||'')}"></div><div class="field"><label>Link</label><input id="resLink" placeholder="Website or confirmation link" value="${esc(r.link||'')}"></div><div class="field"><label>Notes</label><textarea id="resNotes">${esc(r.notes||'')}</textarea></div><div class="actions"><button class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveReservation()">Save</button></div>${state.editing?'<br><button class="btn secondary danger" onclick="deleteReservation()">Delete</button>':''}</div></div>`}
function journalForm(){let j=state.editing||{date:state.modal.date,photos:[]};return `<div class="modal show"><div class="sheet"><h2>${state.editing?'Edit':'Add'} Journal</h2><div class="field"><label>Date</label><input id="jDate" type="date" value="${j.date||state.modal.date}" min="${data.trip.start}" max="${data.trip.end}"></div><div class="field"><label>Title</label><input id="jTitle" placeholder="A favorite moment..." value="${esc(j.title||'')}"></div><div class="field"><label>Journal Entry</label><textarea id="jNote" placeholder="What happened today?">${esc(j.note||'')}</textarea></div><div class="field"><label>Favorite Memory</label><input id="jFav" value="${esc(j.favorite||'')}"></div><div class="field"><label>Funniest Moment</label><input id="jFunny" value="${esc(j.funny||'')}"></div><div class="field"><label>Best Meal</label><input id="jMeal" value="${esc(j.meal||'')}"></div><div class="field"><label>Photos</label><input id="jPhotos" type="file" accept="image/*" multiple></div>${j.photos&&j.photos.length?`<div class="photo-grid">${j.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}<div class="actions"><button class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveJournal()">Save</button></div>${state.editing?'<br><button class="btn secondary danger" onclick="deleteJournal()">Delete</button>':''}</div></div>`}
window.saveReservation=function(){let obj={id:(state.editing&&state.editing.id)||uid(),type:val('resType'),date:val('resDate'),time:val('resTime'),name:val('resName')||'Untitled Reservation',location:val('resLoc'),confirmation:val('resConf'),link:val('resLink'),notes:val('resNotes')}; if(state.editing)data.reservations=data.reservations.map(r=>r.id===obj.id?obj:r); else data.reservations.push(obj); save(); state.modal=null;state.editing=null;setView('day',{selectedDate:obj.date})};
window.saveJournal=async function(){let ex=state.editing||{}, files=[...document.getElementById('jPhotos').files], photos=[...(ex.photos||[])]; for(let f of files)photos.push(await fileToData(f)); let obj={id:ex.id||uid(),date:val('jDate'),title:val('jTitle'),note:val('jNote'),favorite:val('jFav'),funny:val('jFunny'),meal:val('jMeal'),photos}; if(state.editing)data.journals=data.journals.map(j=>j.id===obj.id?obj:j); else data.journals.push(obj); save(); state.modal=null;state.editing=null;setView('day',{selectedDate:obj.date})}; window.deleteReservation=()=>{if(confirm('Delete this reservation?')){data.reservations=data.reservations.filter(r=>r.id!==state.editing.id);save();closeModal()}}; window.deleteJournal=()=>{if(confirm('Delete this journal entry?')){data.journals=data.journals.filter(j=>j.id!==state.editing.id);save();closeModal()}};
function val(id){let x=document.getElementById(id);return x?x.value:''} function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))} function fileToData(file){return new Promise(res=>{let r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
window.exportData=()=>{let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Waypoint_England_Backup.json';a.click();URL.revokeObjectURL(a.href)}; window.importData=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();alert('Backup imported.');render()}catch(err){alert('Could not import this file.')}};r.readAsText(f)}; window.resetData=()=>{if(confirm('Reset Waypoint data on this device?')){localStorage.removeItem(KEY);data=clone(defaultTrip);render()}};
function render(){try{let html=state.view==='home'?home():state.view==='days'?days():state.view==='day'?dayView(state.selectedDate||todayDate()):state.view==='reservations'?reservations():state.view==='journal'?journal():settings(); document.getElementById('app').innerHTML=shell(html)}catch(err){document.getElementById('app').innerHTML=`<div class="app"><div class="hero"><div class="eyebrow">Waypoint</div><h1>Loading issue fixed</h1><p>Please reset local data if needed.</p></div><main class="content"><button class="btn" onclick="localStorage.removeItem('${KEY}');location.reload()">Reset Waypoint Local Data</button><p class="muted">${esc(err.message||err)}</p></main></div>`}}
window.render=render; if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{}); caches&&caches.keys&&caches.keys().then(keys=>keys.forEach(k=>caches.delete(k))).catch(()=>{})} render();
})();
</script></body></html>
