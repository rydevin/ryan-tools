<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="manifest" href="manifest.webmanifest"><title>Waypoint</title><style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--brand:#0f766e;--blue:#2563eb;--gold:#f59e0b;--red:#dc2626;--shadow:0 16px 38px rgba(15,23,42,.1);--r:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:86px}.app{max-width:800px;margin:auto}.hero{padding:26px 18px 23px;background:linear-gradient(135deg,#0f172a,#0f766e 62%,#38bdf8);color:#fff;border-bottom-left-radius:30px;border-bottom-right-radius:30px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;opacity:.78}.hero h1{font-size:34px;line-height:1.02;margin:8px 0 6px}.hero p{margin:0;color:rgba(255,255,255,.84);font-weight:650}.content{padding:16px}.card{background:var(--card);border:1px solid rgba(15,23,42,.06);border-radius:var(--r);padding:17px;margin-bottom:14px;box-shadow:var(--shadow)}h2{font-size:21px;margin:0 0 10px}h3{font-size:17px;margin:0 0 8px}.small{font-size:13px;color:var(--muted);font-weight:650;line-height:1.45}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:15px;min-height:88px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between}.tile strong{font-size:16px}.tile span{font-size:12px;color:var(--muted);font-weight:750}.btn{border:0;border-radius:14px;background:var(--brand);color:#fff;padding:12px 14px;font-weight:900;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#0f172a}.btn.danger{background:var(--red)}.btn.warn{background:#b45309}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.badge{display:inline-flex;border-radius:999px;background:#ecfeff;color:#0f766e;padding:6px 10px;font-weight:900;font-size:12px}.progress{height:9px;background:#e2e8f0;border-radius:99px;overflow:hidden}.bar{height:9px;background:linear-gradient(90deg,#0f766e,#2563eb)}.day{border:1px solid var(--line);border-radius:18px;background:var(--card);padding:14px;margin:10px 0}.day-top{display:flex;justify-content:space-between;gap:10px}.activity{display:flex;gap:10px;padding:10px 0;border-top:1px solid #eef2f7}.activity:first-of-type{border-top:0}.time{min-width:75px;color:var(--brand);font-weight:900}input,textarea,select{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:12px 13px;font:inherit}textarea{min-height:105px;resize:vertical}.form{display:grid;gap:10px}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:30}.tabbar{max-width:800px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}.tab{border:0;background:transparent;padding:8px 3px;border-radius:14px;color:#64748b;font-weight:850;font-size:11px}.tab.active{background:#ecfeff;color:#0f766e}.tab div{font-size:22px;margin-bottom:2px}.view{display:none}.view.active{display:block}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.58);z-index:50;align-items:flex-end}.modal.show{display:flex}.sheet{background:var(--card);width:100%;max-width:800px;margin:auto;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px;max-height:90vh;overflow:auto}.journal-entry{border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:12px;background:var(--card)}.photo{width:100%;max-height:270px;object-fit:cover;border-radius:14px;margin-top:10px}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:18px;text-align:center;color:var(--muted);font-weight:750}.search{position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:8}.result{padding:14px;border-bottom:1px solid var(--line);cursor:pointer}.setting-line{display:flex;justify-content:space-between;gap:14px;align-items:center;border-top:1px solid var(--line);padding:13px 0}.setting-line:first-child{border-top:0}.dark{--bg:#0b1120;--card:#111827;--ink:#f8fafc;--muted:#94a3b8;--line:#243044}.dark .tile{background:#172033}.dark .tabs{background:rgba(15,23,42,.92)}@media(max-width:430px){.grid{grid-template-columns:1fr}.hero h1{font-size:31px}.content{padding:14px}.tabbar{grid-template-columns:repeat(5,1fr)}}
</style></head><body><div class="app"><header class="hero"><div class="eyebrow">Waypoint · England Adventure</div><h1 id="heroTitle">Your trip, one day at a time.</h1><p id="heroSub">Hybrid build: preloaded plan + editable trip builder + private local data.</p></header><main class="content"><section id="today" class="view active"></section><section id="trip" class="view"></section><section id="journal" class="view"></section><section id="builder" class="view"></section><section id="settings" class="view"></section></main></div><nav class="tabs"><div class="tabbar"><button class="tab active" data-view="today" onclick="openView('today')"><div>🏠</div>Today</button><button class="tab" data-view="trip" onclick="openView('trip')"><div>🇬🇧</div>Trip</button><button class="tab" data-view="journal" onclick="openView('journal')"><div>📷</div>Journal</button><button class="tab" data-view="builder" onclick="openView('builder')"><div>✏️</div>Builder</button><button class="tab" data-view="settings" onclick="openView('settings')"><div>⚙️</div>Settings</button></div></nav><div id="modal" class="modal"><div id="sheet" class="sheet"></div></div>
<script>
const STORE='waypoint_england_hybrid_v13';
const seededDays=[
['2026-07-06','London','Park Plaza Victoria London','Arrival day. Keep it light: settle in near Victoria, stretch your legs, and do an easy dinner.',[['Afternoon','Arrive in London and check in'],['Evening','Harrods / easy walk if everyone has energy']]],
['2026-07-07','London','Park Plaza Victoria London','Classic London day with historic sights and flexible pacing.',[['Morning','Westminster / Buckingham Palace area'],['Afternoon','Historic pub or museum option'],['Evening','Easy dinner near Victoria']]],
['2026-07-08','London','Park Plaza Victoria London','London exploring day.',[['Morning','Tower Bridge / Thames area option'],['Afternoon','Parks, shops, or museum time'],['Evening','Relaxed family dinner']]],
['2026-07-09','London','Park Plaza Victoria London','Warner Bros. Studio Tour day.',[['Morning','Train to Watford Junction'],['Day','Warner Bros. Studio Tour London'],['Evening','Return to Victoria']]],
['2026-07-10','London','Park Plaza Victoria London','Final full London day.',[['Morning','Finish must-see London items'],['Afternoon','Pack / flexible family time'],['Evening','Last London dinner']]],
['2026-07-11','Cambridge','Cambridge lodging','Travel to Cambridge and settle into the historic city.',[['Morning','Train from London to Cambridge'],['Afternoon','Walk historic center'],['Evening','Dinner in Cambridge']]],
['2026-07-12','Cambridge','Cambridge lodging','Punting, colleges, and Sunday roast.',[['Morning','Punting on the River Cam'],['Afternoon','Explore colleges and lanes'],['Evening','Sunday roast']]],
['2026-07-13','York','York lodging','Travel to York. Elizabeth birthday arrival day.',[['Morning','Train to York'],['Afternoon','The Shambles and city walls'],['Evening',"Elizabeth's birthday dinner"]]],
['2026-07-14','York','York lodging','York Minster and historic city day.',[['Morning','York Minster'],['Afternoon','City walls, old streets, shops'],['Evening','Optional ghost walk']]],
['2026-07-15','York','York lodging','Extra York night / flexible day.',[['Day','Flexible York day'],['Evening','Prepare for Whitby']]],
['2026-07-16','Whitby','Whitby lodging','Coast, abbey, harbor, and Robin Hood’s Bay option.',[['Morning','Travel to Whitby'],['Afternoon','Whitby Abbey and harbor'],['Evening','Fish and chips or coastal dinner']]],
['2026-07-17','Yorkshire Dales','Yorkshire Dales cottage','Arrive in the Dales and slow down.',[['Day','Travel to Yorkshire Dales'],['Evening','Settle into cottage and pub dinner']]],
['2026-07-18','Yorkshire Dales','Yorkshire Dales cottage','Hiking and village day.',[['Morning','Dales hike or village walk'],['Afternoon','Waterfall or scenic drive']]],
['2026-07-19','Yorkshire Dales','Yorkshire Dales cottage','Sunday roast and relaxed exploring.',[['Day','Village exploring'],['Evening','Sunday roast']]],
['2026-07-20','Yorkshire Dales','Yorkshire Dales cottage','Adventure day in the Dales.',[['Morning','Hike / waterfall'],['Afternoon','Tea room or village stop']]],
['2026-07-21','Yorkshire Dales','Yorkshire Dales cottage','Fly fishing or hiking day.',[['Morning','Fly fishing option'],['Afternoon','Family walk / scenic pub']]],
['2026-07-22','Yorkshire Dales','Yorkshire Dales cottage','Flexible Dales day.',[['Day','Open adventure day'],['Evening','Pub dinner']]],
['2026-07-23','Yorkshire Dales','Yorkshire Dales cottage','Last full Dales day.',[['Morning','Favorite hike or village revisit'],['Evening','Pack for Cotswolds']]],
['2026-07-24','Yorkshire Dales','Yorkshire Dales cottage','Transition / buffer day.',[['Day','Flexible day before Cotswolds travel']]],
['2026-07-25','Cotswolds','Cotswolds lodging','Arrive in the Cotswolds.',[['Day','Travel to Cotswolds'],['Evening','Village walk and dinner']]],
['2026-07-26','Cotswolds','Cotswolds lodging','North Cotswolds village day.',[['Morning','Chipping Campden / Broadway option'],['Afternoon','Countryside walk'],['Evening','Sunday roast option']]],
['2026-07-27','Cotswolds','Cotswolds lodging','Cotswolds exploring day.',[['Morning','Village and footpath walk'],['Afternoon','Bakery / tea room stop']]],
['2026-07-28','Cotswolds','Cotswolds lodging','Diddly Squat / Clarkson’s Farm style day.',[['Day','Diddly Squat Farm / local villages'],['Evening','Relaxed dinner']]],
['2026-07-29','Cotswolds','Cotswolds lodging','River Coln / Fairford fly fishing option.',[['Morning','Fly fishing option near Fairford'],['Afternoon','Family exploring']]],
['2026-07-30','Cotswolds','Cotswolds lodging','Flexible Cotswolds day.',[['Day','Open day for favorite villages or hike']]],
['2026-07-31','Cotswolds','Cotswolds lodging','Final full Cotswolds day.',[['Day','Favorite village revisit'],['Evening','Pack for Castle Combe']]],
['2026-08-01','Castle Combe','Castle Combe lodging','Move to Castle Combe.',[['Day','Travel to Castle Combe'],['Evening','Walk the village']]],
['2026-08-02','Castle Combe','Castle Combe lodging','Castle Combe and nearby exploring.',[['Morning','Village walk'],['Afternoon','Nearby countryside / pub stop']]],
['2026-08-03','Castle Combe','Castle Combe lodging','Flexible day from Castle Combe.',[['Day','Bradford-on-Avon or nearby adventure']]],
['2026-08-04','Castle Combe','Castle Combe lodging','Last Castle Combe day.',[['Day','Open family day'],['Evening','Pack for Winchester']]],
['2026-08-05','Castle Combe / Winchester transition','Transition lodging','Buffer day before Winchester.',[['Day','Flexible travel / rest day']]],
['2026-08-06','Winchester','Winchester lodging','Winchester day before flying home.',[['Morning','Great Hall'],['Afternoon','St Catherine’s Hill'],['Evening','Final England dinner']]],
['2026-08-07','Fly Home','Travel day','Return home.',[['Day','Travel to airport and fly home']]]
];
const seed=()=>({version:'1.3 hybrid',theme:'system',trip:{name:'England Adventure 2026',travelers:['Ryan','Julie','Elizabeth','Ethan','Everley'],start:'2026-07-06',end:'2026-08-07',notes:'Local-first trip database. Edit anything in Builder.'},days:seededDays.map(d=>({date:d[0],place:d[1],stay:d[2],summary:d[3],items:d[4].map(x=>({time:x[0],text:x[1],done:false}))})),reservations:[{title:'Warner Bros. Studio Tour London',date:'2026-07-09',notes:'Add confirmation number, ticket details, train notes, and shuttle info.'},{title:"Elizabeth's birthday dinner",date:'2026-07-13',notes:'Add restaurant name, reservation time, and confirmation.'}],restaurants:[],places:[],journal:[],lastUpdated:new Date().toISOString()});
let state;try{state=JSON.parse(localStorage.getItem(STORE)||'null')||seed()}catch(e){state=seed()}
function save(){state.lastUpdated=new Date().toISOString();localStorage.setItem(STORE,JSON.stringify(state))}
function openView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===id));render()}
function render(){applyTheme();renderToday();renderTrip();renderJournal();renderBuilder();renderSettings()}
function todayIndex(){let now=new Date(),today=now.toISOString().slice(0,10),i=state.days.findIndex(d=>d.date>=today);return i<0?state.days.length-1:i}
function fmt(d){let x=new Date(d+'T12:00:00');return x.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function renderToday(){let i=todayIndex(),d=state.days[i],done=d.items.filter(x=>x.done).length,pct=Math.round(((i+1)/state.days.length)*100);heroTitle.textContent=`Today: ${d.place}`;heroSub.textContent=`${fmt(d.date)} · Day ${i+1} of ${state.days.length}`;today.innerHTML=`<div class="card"><span class="badge">Day ${i+1}</span><h2>${d.place}</h2><p class="small">${e(d.summary)}</p><p class="small"><strong>Staying:</strong> ${e(d.stay||'Add lodging')}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p class="small">Trip progress: ${pct}%</p><div class="btn-row"><button class="btn" onclick="editDay(${i})">Edit today</button><button class="btn secondary" onclick="openView('journal')">Add journal</button></div></div><div class="card"><h2>Today's Plan</h2>${d.items.map((it,j)=>`<div class="activity"><input type="checkbox" ${it.done?'checked':''} onchange="toggleItem(${i},${j})"><div class="time">${e(it.time)}</div><div>${e(it.text)}</div></div>`).join('')}<p class="small">${done} of ${d.items.length} complete</p></div><div class="grid"><div class="tile" onclick="location.href='Everley_Hunt_GALLERY.html'"><strong>👑 Everley Hunt</strong><span>Open hunt</span></div><div class="tile" onclick="location.href='Ethan_Hunt_GALLERY.html'"><strong>⚔️ Ethan Hunt</strong><span>Open hunt</span></div><div class="tile" onclick="location.href='Elizabeth_Hunt_GALLERY.html'"><strong>👸 Elizabeth Hunt</strong><span>Open hunt</span></div><div class="tile" onclick="openReservations()"><strong>🎟 Reservations</strong><span>${state.reservations.length} saved</span></div></div>`}
function renderTrip(){let by=[...new Set(state.days.map(d=>d.place))];trip.innerHTML=`<div class="card"><h2>${e(state.trip.name)}</h2><p class="small">${fmt(state.trip.start)} – ${fmt(state.trip.end)} · ${state.days.length} days · ${state.trip.travelers.join(', ')}</p><div class="btn-row"><button class="btn" onclick="openView('builder')">Edit Trip</button><button class="btn secondary" onclick="exportBackup()">Export Backup</button></div></div><div class="card"><h2>Destinations</h2><div class="grid">${by.map(p=>`<div class="tile" onclick="filterPlace('${ea(p)}')"><strong>📍 ${e(p)}</strong><span>${state.days.filter(d=>d.place===p).length} day(s)</span></div>`).join('')}</div></div><div class="card"><h2>Full Itinerary</h2>${state.days.map((d,i)=>`<div class="day" onclick="editDay(${i})"><div class="day-top"><div><strong>${fmt(d.date)} · ${e(d.place)}</strong><div class="small">${e(d.summary)}</div></div><span class="badge">${d.items.length} items</span></div></div>`).join('')}</div>`}
function filterPlace(p){openView('trip');setTimeout(()=>{trip.innerHTML=`<div class="card"><h2>📍 ${e(p)}</h2><button class="btn secondary" onclick="renderTrip()">Show all</button></div>${state.days.map((d,i)=>d.place===p?`<div class="day" onclick="editDay(${i})"><strong>${fmt(d.date)} · ${e(d.place)}</strong><p class="small">${e(d.summary)}</p></div>`:'').join('')}`},0)}
function renderJournal(){journal.innerHTML=`<div class="card"><h2>Daily Journal</h2><div class="form"><select id="jDay">${state.days.map((d,i)=>`<option value="${i}">${fmt(d.date)} · ${e(d.place)}</option>`).join('')}</select><textarea id="jText" placeholder="Favorite memory, funniest moment, best meal, what the kids loved..."></textarea><input id="jPhoto" type="file" accept="image/*"><button class="btn" onclick="saveJournal()">Save entry</button></div></div><div class="card"><h2>Saved Entries</h2>${state.journal.length?state.journal.slice().reverse().map((j,r)=>{let i=state.journal.length-1-r;return `<div class="journal-entry"><strong>${fmt(j.date)} · ${e(j.place)}</strong><p>${e(j.text).replace(/\n/g,'<br>')}</p>${j.photo?`<img class="photo" src="${j.photo}">`:''}<div class="btn-row"><button class="btn secondary" onclick="editJournal(${i})">Edit</button><button class="btn danger" onclick="deleteJournal(${i})">Delete</button></div></div>`}).join(''):'<div class="empty">No journal entries yet.</div>'}</div>`}
function renderBuilder(){builder.innerHTML=`<div class="card"><h2>Trip Builder</h2><p class="small">This is the editable master trip database. Changes save privately on this device.</p><div class="grid"><div class="tile" onclick="editTripInfo()"><strong>🧭 Trip Info</strong><span>Name, dates, travelers</span></div><div class="tile" onclick="addDay()"><strong>📅 Add Day</strong><span>Add itinerary day</span></div><div class="tile" onclick="openReservations()"><strong>🎟 Reservations</strong><span>Tickets, hotels, confirmations</span></div><div class="tile" onclick="addPlaceNote()"><strong>📍 Saved Place</strong><span>Restaurant, hike, fishing, note</span></div></div></div><div class="card"><h2>Saved Places & Notes</h2>${state.places.length?state.places.map((p,i)=>`<div class="journal-entry"><strong>${e(p.title)}</strong><div class="small">${e(p.type||'Note')}</div><p>${e(p.notes).replace(/\n/g,'<br>')}</p><button class="btn danger" onclick="delPlace(${i})">Delete</button></div>`).join(''):'<div class="empty">No saved places yet.</div>'}</div>`}
function renderSettings(){settings.innerHTML=`<div class="card"><h2>Settings & Privacy</h2><div class="setting-line"><div><strong>Storage</strong><div class="small">All personal trip data is stored locally on this device only. GitHub only hosts the blank app files.</div></div></div><div class="setting-line"><div><strong>Theme</strong></div><select onchange="state.theme=this.value;save();render()"><option value="system" ${state.theme==='system'?'selected':''}>System</option><option value="light" ${state.theme==='light'?'selected':''}>Light</option><option value="dark" ${state.theme==='dark'?'selected':''}>Dark</option></select></div><div class="btn-row"><button class="btn" onclick="exportBackup()">Export Backup</button><button class="btn secondary" onclick="importBackup()">Import Backup</button><button class="btn warn" onclick="resetLocal()">Reset Local Data</button></div><p class="small">Last saved: ${new Date(state.lastUpdated).toLocaleString()}</p></div>`}
function editTripInfo(){show(`<h2>Edit Trip Info</h2><div class="form"><input id="tName" value="${ea(state.trip.name)}"><input id="tStart" type="date" value="${state.trip.start}"><input id="tEnd" type="date" value="${state.trip.end}"><textarea id="tTravelers">${e(state.trip.travelers.join('\n'))}</textarea><textarea id="tNotes">${e(state.trip.notes||'')}</textarea><div class="btn-row"><button class="btn" onclick="saveTripInfo()">Save</button><button class="btn secondary" onclick="closeSheet()">Cancel</button></div></div>`)}
function saveTripInfo(){state.trip.name=v('tName');state.trip.start=v('tStart');state.trip.end=v('tEnd');state.trip.travelers=v('tTravelers').split('\n').map(x=>x.trim()).filter(Boolean);state.trip.notes=v('tNotes');save();closeSheet();render()}
function editDay(i){let d=state.days[i];show(`<h2>Edit Day</h2><div class="form"><input id="dDate" type="date" value="${d.date}"><input id="dPlace" value="${ea(d.place)}"><input id="dStay" value="${ea(d.stay||'')}"><textarea id="dSummary">${e(d.summary||'')}</textarea><textarea id="dItems">${d.items.map(x=>`${x.time} | ${x.text}`).join('\n')}</textarea><p class="small">Activities format: time | activity. One per line.</p><div class="btn-row"><button class="btn" onclick="saveDay(${i})">Save</button><button class="btn secondary" onclick="closeSheet()">Cancel</button><button class="btn danger" onclick="deleteDay(${i})">Delete</button></div></div>`)}
function saveDay(i){state.days[i]={date:v('dDate'),place:v('dPlace'),stay:v('dStay'),summary:v('dSummary'),items:parseItems(v('dItems'))};state.days.sort((a,b)=>a.date.localeCompare(b.date));save();closeSheet();render()}
function parseItems(txt){return txt.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>{let p=line.split('|');return p.length>1?{time:p[0].trim(),text:p.slice(1).join('|').trim(),done:false}:{time:'',text:line,done:false}})}
function addDay(){state.days.push({date:state.trip.start,place:'New Day',stay:'',summary:'Add your plan.',items:[{time:'Day',text:'Add activity',done:false}]});save();render();editDay(state.days.length-1)}
function deleteDay(i){if(confirm('Delete this day?')){state.days.splice(i,1);save();closeSheet();render()}}
function toggleItem(i,j){state.days[i].items[j].done=!state.days[i].items[j].done;save();render()}
function saveJournal(){let i=+v('jDay'),text=v('jText').trim();if(!text)return alert('Add a note first.');let file=document.getElementById('jPhoto').files[0];let add=photo=>{state.journal.push({date:state.days[i].date,place:state.days[i].place,text,photo:photo||'',created:new Date().toISOString()});save();renderJournal();alert('Journal saved.')};if(file){let r=new FileReader();r.onload=x=>add(x.target.result);r.readAsDataURL(file)}else add('')}
function editJournal(i){let j=state.journal[i];show(`<h2>Edit Journal</h2><div class="form"><textarea id="ej">${e(j.text)}</textarea><div class="btn-row"><button class="btn" onclick="state.journal[${i}].text=v('ej');save();closeSheet();renderJournal()">Save</button><button class="btn secondary" onclick="closeSheet()">Cancel</button></div></div>`)}
function deleteJournal(i){if(confirm('Delete this entry?')){state.journal.splice(i,1);save();renderJournal()}}
function openReservations(){show(`<h2>Reservations</h2><div class="form"><input id="rTitle" placeholder="Name"><input id="rDate" type="date"><textarea id="rNotes" placeholder="Confirmation, address, links, notes"></textarea><button class="btn" onclick="addReservation()">Save reservation</button></div>${state.reservations.map((r,i)=>`<div class="journal-entry"><strong>${e(r.title)}</strong><div class="small">${e(r.date||'')}</div><p>${e(r.notes).replace(/\n/g,'<br>')}</p><button class="btn danger" onclick="delReservation(${i})">Delete</button></div>`).join('')}<div class="btn-row"><button class="btn secondary" onclick="closeSheet()">Close</button></div>`)}
function addReservation(){state.reservations.push({title:v('rTitle'),date:v('rDate'),notes:v('rNotes')});save();openReservations()}
function delReservation(i){state.reservations.splice(i,1);save();openReservations()}
function addPlaceNote(){show(`<h2>Add Saved Place</h2><div class="form"><input id="pTitle" placeholder="Name"><select id="pType"><option>Restaurant</option><option>Hike</option><option>Fishing</option><option>Pub</option><option>Parking</option><option>Note</option></select><textarea id="pNotes" placeholder="Notes, links, address, why it matters..."></textarea><div class="btn-row"><button class="btn" onclick="savePlace()">Save</button><button class="btn secondary" onclick="closeSheet()">Cancel</button></div></div>`)}
function savePlace(){state.places.push({title:v('pTitle'),type:v('pType'),notes:v('pNotes')});save();closeSheet();render()}
function delPlace(i){state.places.splice(i,1);save();renderBuilder()}
function exportBackup(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='waypoint-england-adventure-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importBackup(){let inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=()=>{let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{try{let data=JSON.parse(x.target.result);if(!data.days)throw Error();state=data;save();render();alert('Backup restored.')}catch(e){alert('That backup was not recognized.')}};r.readAsText(f)};inp.click()}
function resetLocal(){if(confirm('Reset all local England Adventure data on this device?')){localStorage.removeItem(STORE);state=seed();save();render()}}
function applyTheme(){let dark=state.theme==='dark'||(state.theme==='system'&&matchMedia('(prefers-color-scheme: dark)').matches);document.body.classList.toggle('dark',dark)}
function show(html){sheet.innerHTML=html;modal.classList.add('show')}function closeSheet(){modal.classList.remove('show')}modal.addEventListener('click',e=>{if(e.target.id==='modal')closeSheet()});function v(id){return document.getElementById(id).value}function e(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function ea(s){return e(s).replace(/`/g,'&#96;')}if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}render();
