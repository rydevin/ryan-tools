<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="css/app.css" />
<title>Waypoint</title>
</head>
<body>
<div id="app" class="app-shell">
  <header class="hero">
    <div>
      <div class="eyebrow">Waypoint 2.0</div>
      <h1 id="pageTitle">Waypoint</h1>
      <p id="pageSubtitle">Your local-first travel and life command center.</p>
    </div>
    <button class="icon-button" id="themeBtn" aria-label="Toggle theme">☀️</button>
  </header>

  <main id="main" class="main"></main>

  <nav class="tabbar" aria-label="Main navigation">
    <button data-route="home" class="tab active">🏠<span>Home</span></button>
    <button data-route="england" class="tab">🇬🇧<span>England</span></button>
    <button data-route="journal" class="tab">📷<span>Journal</span></button>
    <button data-route="settings" class="tab">⚙️<span>Settings</span></button>
  </nav>
</div>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-head">
      <h2 id="modalTitle">Edit</h2>
      <button class="icon-button" id="closeModal">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<input id="importFile" type="file" accept="application/json,.json,.waypoint" hidden />
<script src="js/default-data.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
