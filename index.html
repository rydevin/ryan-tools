<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Waypoint</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--brand:#0f766e;--brand2:#2563eb;--warm:#f59e0b;--shadow:0 16px 40px rgba(15,23,42,.10);--radius:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:86px}.app{max-width:760px;margin:0 auto}.hero{padding:26px 18px 22px;background:linear-gradient(135deg,#0f172a,#0f766e 62%,#38bdf8);color:white;border-bottom-left-radius:28px;border-bottom-right-radius:28px;box-shadow:var(--shadow)}.eyebrow{font-size:13px;font-weight:800;opacity:.78;letter-spacing:.06em;text-transform:uppercase}.hero h1{margin:8px 0 6px;font-size:34px;line-height:1.04}.hero p{margin:0;color:rgba(255,255,255,.82);font-weight:650}.top-actions{display:flex;gap:10px;margin-top:18px}.pill{border:0;border-radius:999px;padding:11px 14px;background:rgba(255,255,255,.14);color:white;font-weight:800;backdrop-filter:blur(10px)}.content{padding:18px}.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(15,23,42,.05)}.card h2{font-size:21px;margin:0 0 10px}.card h3{font-size:17px;margin:0 0 10px}.small{font-size:13px;color:var(--muted);font-weight:650;line-height:1.4}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:15px;min-height:92px;display:flex;flex-direction:column;gap:6px;justify-content:space-between;cursor:pointer}.tile strong{font-size:16px}.tile span{font-size:12px;color:var(--muted);font-weight:700}.btn{border:0;border-radius:14px;background:var(--brand);color:white;padding:12px 14px;font-weight:900;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#0f172a}.btn.warn{background:#b45309}.btn.danger{background:#dc2626}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:30}.tabbar{max-width:760px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}.tab{border:0;background:transparent;padding:8px 4px;border-radius:14px;color:#64748b;font-weight:850;font-size:12px}.tab.active{background:#ecfeff;color:#0f766e}.tab div{font-size:22px;margin-bottom:2px}.view{display:none}.view.active{display:block}.day-card{border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:#fff}.day-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;border-radius:999px;background:#ecfeff;color:#0f766e;padding:6px 10px;font-weight:900;font-size:12px}.activity{display:flex;gap:10px;padding:10px 0;border-top:1px solid #eef2f7}.activity:first-of-type{border-top:0}.time{min-width:76px;color:#0f766e;font-weight:900}.activity input{transform:scale(1.15)}input,textarea,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 13px;font:inherit;color:var(--ink)}textarea{min-height:110px;resize:vertical}.form{display:grid;gap:10px}.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(15,23,42,.55);align-items:flex-end}.modal.show{display:flex}.sheet{background:white;width:100%;max-width:760px;margin:0 auto;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px;max-height:88vh;overflow:auto}.sheet h2{margin:0 0 12px}.journal-entry{border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:12px;background:#fff}.photo{width:100%;max-height:280px;object-fit:cover;border-radius:14px;margin-top:10px}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:18px;text-align:center;color:#64748b;font-weight:700}.search{position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10}.result{padding:14px;border-bottom:1px solid var(--line);cursor:pointer}.result strong{display:block}.setting-line{display:flex;justify-content:space-between;gap:14px;align-items:center;border-top:1px solid var(--line);padding:13px 0}.setting-line:first-child{border-top:0}.dark{--bg:#0b1120;--card:#111827;--ink:#f8fafc;--muted:#94a3b8;--line:#243044}.dark .tile{background:#172033}.dark .tabs{background:rgba(15,23,42,.92)}.dark input,.dark textarea,.dark select,.dark .sheet,.dark .day-card,.dark .journal-entry{background:#111827;color:#f8fafc;border-color:#243044}@media(max-width:420px){.grid{grid-template-columns:1fr}.hero h1{font-size:31px}.content{padding:14px}}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="eyebrow">Waypoint · England Adventure</div>
    <h1 id="heroTitle">Your travel day, simplified.</h1>
    <p id="heroSub">Today view, editable itinerary, journal, and reservations.</p>
    <div class="top-actions"><button class="pill" onclick="openView('today')">Today</button><button class="pill" onclick="openView('journal')">Add Journal</button></div>
  </header>

  <main class="content">
    <section id="today" class="view active"></section>
    <section id="itinerary" class="view"></section>
    <section id="journal" class="view"></section>
    <section id="settings" class="view"></section>
  </main>
</div>

<nav class="tabs"><div class="tabbar">
  <button class="tab active" data-view="today" onclick="openView('today')"><div>🏠</div>Today</button>
  <button class="tab" data-view="itinerary" onclick="openView('itinerary')"><div>📅</div>Itinerary</button>
  <button class="tab" data-view="journal" onclick="openView('journal')"><div>📷</div>Journal</button>
  <button class="tab" data-view="settings" onclick="openView('settings')"><div>⚙️</div>Settings</button>
</div></nav>

<div id="modal" class="modal"><div class="sheet" id="sheet"></div></div>

<script>
const STORE='waypoint_england_v12';
const DEFAULT_DAYS=[
 {date:'2026-07-06',place:'London',stay:'Park Plaza Victoria London',summary:'Arrival day. Keep it light: settle in, walk near Victoria, easy dinner.',items:[{time:'Afternoon',text:'Arrive in London and check in',done:false},{time:'Evening',text:'Easy walk and simple dinner near Victoria',done:false}]},
 {date:'2026-07-07',place:'London',stay:'Park Plaza Victoria London',summary:'London exploring day.',items:[{time:'Morning',text:'London sightseeing',done:false},{time:'Afternoon',text:'Parks, historic streets, or museum time',done:false}]},
 {date:'2026-07-08',place:'London',stay:'Park Plaza Victoria London',summary:'London exploring day.',items:[{time:'Morning',text:'London sights',done:false},{time:'Evening',text:'Historic pub or relaxed family dinner',done:false}]},
 {date:'2026-07-09',place:'London',stay:'Park Plaza Victoria London',summary:'Harry Potter Studios day.',items:[{time:'Morning',text:'Train to Watford Junction',done:false},{time:'Day',text:'Warner Bros. Studio Tour London',done:false},{time:'Evening',text:'Return to Victoria',done:false}]},
 {date:'2026-07-10',place:'London',stay:'Park Plaza Victoria London',summary:'Final full London day.',items:[{time:'Morning',text:'Finish London must-sees',done:false},{time:'Evening',text:'Pack for Cambridge',done:false}]},
 {date:'2026-07-11',place:'Cambridge',stay:'Cambridge lodging',summary:'Travel to Cambridge and ease into the city.',items:[{time:'Morning',text:'Train from London to Cambridge',done:false},{time:'Afternoon',text:'Walk historic center',done:false}]},
 {date:'2026-07-12',place:'Cambridge',stay:'Cambridge lodging',summary:'Punting, colleges, and Sunday roast.',items:[{time:'Morning',text:'Punting on the River Cam',done:false},{time:'Afternoon',text:'Explore colleges and lanes',done:false},{time:'Evening',text:'Sunday roast',done:false}]},
 {date:'2026-07-13',place:'York',stay:'York lodging',summary:'Travel to York. Elizabeth birthday arrival day.',items:[{time:'Morning',text:'Train to York',done:false},{time:'Afternoon',text:'The Shambles and city walls',done:false},{time:'Evening',text:"Elizabeth's birthday dinner",done:false}]},
 {date:'2026-07-14',place:'York',stay:'York lodging',summary:'York Minster and historic city day.',items:[{time:'Morning',text:'York Minster',done:false},{time:'Afternoon',text:'City walls, shops, and old streets',done:false}]},
 {date:'2026-07-15',place:'York',stay:'York lodging',summary:'Extra York night / flexible day.',items:[{time:'Day',text:'Flexible York day',done:false},{time:'Evening',text:'Prepare for Whitby',done:false}]},
 {date:'2026-07-16',place:'Whitby',stay:'Whitby lodging',summary:'Coast, abbey, and Robin Hood’s Bay.',items:[{time:'Morning',text:'Travel to Whitby',done:false},{time:'Afternoon',text:'Whitby Abbey and harbor',done:false},{time:'Evening',text:'Fish and chips or coastal dinner',done:false}]},
 {date:'2026-07-17',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Arrive in the Dales.',items:[{time:'Day',text:'Travel to Yorkshire Dales',done:false},{time:'Evening',text:'Settle into cottage and pub dinner',done:false}]},
 {date:'2026-07-18',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Hiking and village day.',items:[{time:'Morning',text:'Dales hike or village walk',done:false},{time:'Afternoon',text:'Waterfall or scenic drive',done:false}]},
 {date:'2026-07-19',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Sunday roast and relaxed exploring.',items:[{time:'Day',text:'Village exploring',done:false},{time:'Evening',text:'Sunday roast',done:false}]},
 {date:'2026-07-20',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Dales adventure day.',items:[{time:'Day',text:'Hike, waterfall, or scenic village route',done:false}]},
 {date:'2026-07-21',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Dales adventure day.',items:[{time:'Day',text:'Flexible Dales day',done:false}]},
 {date:'2026-07-22',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Dales adventure day.',items:[{time:'Day',text:'Flexible hike or fishing option',done:false}]},
 {date:'2026-07-23',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Final full Dales day.',items:[{time:'Day',text:'Favorite Dales hike or village revisit',done:false},{time:'Evening',text:'Pack for Cotswolds',done:false}]},
 {date:'2026-07-24',place:'Yorkshire Dales',stay:'Yorkshire Dales cottage',summary:'Transition day.',items:[{time:'Day',text:'Flexible travel/rest day',done:false}]},
 {date:'2026-07-25',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Arrive in the Cotswolds.',items:[{time:'Day',text:'Travel to Cotswolds',done:false},{time:'Evening',text:'Village walk and dinner',done:false}]},
 {date:'2026-07-26',place:'Cotswolds',stay:'Cotswolds lodging',summary:'North Cotswolds exploring.',items:[{time:'Day',text:'Chipping Campden / Broadway area',done:false}]},
 {date:'2026-07-27',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Villages and walks.',items:[{time:'Day',text:'Cotswolds village loop or countryside walk',done:false}]},
 {date:'2026-07-28',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Farm and countryside day.',items:[{time:'Day',text:'Diddly Squat / Farmer’s Dog area option',done:false}]},
 {date:'2026-07-29',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Flexible Cotswolds day.',items:[{time:'Day',text:'Relaxed exploring or fishing option',done:false}]},
 {date:'2026-07-30',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Flexible Cotswolds day.',items:[{time:'Day',text:'Scenic village and footpath day',done:false}]},
 {date:'2026-07-31',place:'Cotswolds',stay:'Cotswolds lodging',summary:'Final full Cotswolds day.',items:[{time:'Day',text:'Favorite Cotswolds village or hike',done:false},{time:'Evening',text:'Pack for Castle Combe',done:false}]},
 {date:'2026-08-01',place:'Castle Combe',stay:'Castle Combe lodging',summary:'Arrive in Castle Combe.',items:[{time:'Day',text:'Travel to Castle Combe',done:false},{time:'Evening',text:'Village walk',done:false}]},
 {date:'2026-08-02',place:'Castle Combe',stay:'Castle Combe lodging',summary:'Castle Combe and nearby villages.',items:[{time:'Day',text:'Explore Castle Combe and countryside',done:false}]},
 {date:'2026-08-03',place:'Castle Combe',stay:'Castle Combe lodging',summary:'Flexible day.',items:[{time:'Day',text:'Nearby village, walk, or relaxed family day',done:false}]},
 {date:'2026-08-04',place:'Castle Combe',stay:'Castle Combe lodging',summary:'Final Castle Combe day.',items:[{time:'Day',text:'Final Castle Combe exploring',done:false},{time:'Evening',text:'Pack for Winchester',done:false}]},
 {date:'2026-08-05',place:'Castle Combe / Winchester',stay:'Transition night',summary:'Transition toward Winchester.',items:[{time:'Day',text:'Flexible travel day toward Winchester',done:false}]},
 {date:'2026-08-06',place:'Winchester',stay:'Winchester lodging',summary:'Great Hall, Winchester, and St Catherine’s Hill.',items:[{time:'Morning',text:'The Great Hall',done:false},{time:'Afternoon',text:'Winchester Cathedral or St Catherine’s Hill',done:false},{time:'Evening',text:'Pack for flight home',done:false}]},
 {date:'2026-08-07',place:'Fly Home',stay:'Home',summary:'Return flight day.',items:[{time:'Morning',text:'Travel to airport',done:false},{time:'Day',text:'Fly home',done:false}]}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(STORE))||seed()}catch(e){return seed()}}
function seed(){return{theme:'system',days:DEFAULT_DAYS,journal:[],reservations:[],favorites:['England Adventure','Everley Hunt'],lastUpdated:new Date().toISOString()}}
function save(){state.lastUpdated=new Date().toISOString();localStorage.setItem(STORE,JSON.stringify(state));}
function fmtDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});} 
function todayIndex(){const today=new Date();const t=today.toISOString().slice(0,10);let idx=state.days.findIndex(d=>d.date===t);if(idx>-1)return idx; if(t<state.days[0].date)return 0; return state.days.length-1;}
function render(){applyTheme();renderToday();renderItinerary();renderJournal();renderSettings();}
function openView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===id));window.scrollTo({top:0,behavior:'smooth'});if(id==='journal')setTimeout(()=>document.getElementById('journalText')?.focus(),150)}
function renderToday(){const idx=todayIndex(),d=state.days[idx];const done=d.items.filter(i=>i.done).length;document.getElementById('heroTitle').textContent=`Today: ${d.place}`;document.getElementById('heroSub').textContent=`${fmtDate(d.date)} · Day ${idx+1} of ${state.days.length}`;document.getElementById('today').innerHTML=`
<div class="card"><span class="badge">Day ${idx+1}</span><h2>${d.place}</h2><p class="small">${d.summary}</p><p class="small"><strong>Staying:</strong> ${d.stay||'Add lodging details'}</p><div class="btn-row"><button class="btn" onclick="editDay(${idx})">Edit today</button><button class="btn secondary" onclick="openView('journal')">Add journal</button></div></div>
<div class="card"><h2>Today's Plan</h2>${d.items.map((it,i)=>`<div class="activity"><input type="checkbox" ${it.done?'checked':''} onchange="toggleItem(${idx},${i})"><div class="time">${it.time}</div><div>${it.text}</div></div>`).join('')}<p class="small">${done} of ${d.items.length} complete</p></div>
<div class="grid"><div class="tile" onclick="location.href='Everley_Hunt_GALLERY.html'"><strong>👑 Everley Hunt</strong><span>Open scavenger hunt</span></div><div class="tile" onclick="location.href='Ethan_Hunt_GALLERY.html'"><strong>⚔️ Ethan Hunt</strong><span>Open scavenger hunt</span></div><div class="tile" onclick="location.href='Elizabeth_Hunt_GALLERY.html'"><strong>👸 Elizabeth Hunt</strong><span>Open scavenger hunt</span></div><div class="tile" onclick="openReservations()"><strong>🎟 Reservations</strong><span>${state.reservations.length} saved</span></div></div>`;}
function renderItinerary(){document.getElementById('itinerary').innerHTML=`<div class="card"><h2>England Itinerary</h2><p class="small">Tap any day to edit. Changes save only on this device.</p><div class="btn-row"><button class="btn" onclick="addDay()">+ Add day</button><button class="btn secondary" onclick="exportBackup()">Export backup</button></div></div>${state.days.map((d,idx)=>`<div class="day-card" onclick="editDay(${idx})"><div class="day-head"><div><strong>${fmtDate(d.date)} · ${d.place}</strong><div class="small">${d.summary}</div></div><span class="badge">${d.items.length} items</span></div></div>`).join('')}`;}
function renderJournal(){document.getElementById('journal').innerHTML=`<div class="card"><h2>Travel Journal</h2><div class="form"><select id="journalDay">${state.days.map((d,i)=>`<option value="${i}">${fmtDate(d.date)} · ${d.place}</option>`).join('')}</select><textarea id="journalText" placeholder="What happened today? Favorite memory, funniest moment, best food, or anything you want to remember..."></textarea><input id="journalPhoto" type="file" accept="image/*"><button class="btn" onclick="saveJournal()">Save journal entry</button></div></div><div class="card"><h2>Saved Entries</h2>${state.journal.length?state.journal.slice().reverse().map((j,revIdx)=>{const i=state.journal.length-1-revIdx;return `<div class="journal-entry"><strong>${fmtDate(j.date)} · ${j.place}</strong><p>${escapeHtml(j.text).replace(/\n/g,'<br>')}</p>${j.photo?`<img class="photo" src="${j.photo}">`:''}<div class="btn-row"><button class="btn secondary" onclick="editJournal(${i})">Edit</button><button class="btn danger" onclick="deleteJournal(${i})">Delete</button></div></div>`}).join(''):'<div class="empty">No journal entries yet.</div>'}</div>`;}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card"><h2>Settings & Privacy</h2><div class="setting-line"><div><strong>Storage</strong><div class="small">Journal, itinerary edits, reservations, favorites, and settings are stored locally on this device only.</div></div></div><div class="setting-line"><div><strong>Theme</strong></div><select onchange="state.theme=this.value;save();render()"><option ${state.theme==='system'?'selected':''} value="system">System</option><option ${state.theme==='light'?'selected':''} value="light">Light</option><option ${state.theme==='dark'?'selected':''} value="dark">Dark</option></select></div><div class="btn-row"><button class="btn" onclick="exportBackup()">Export backup</button><button class="btn secondary" onclick="importBackup()">Import backup</button><button class="btn warn" onclick="resetTrip()">Reset local data</button></div><p class="small">Last saved: ${new Date(state.lastUpdated).toLocaleString()}</p></div>`;}
function applyTheme(){let dark=state.theme==='dark'||(state.theme==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.body.classList.toggle('dark',dark)}
function toggleItem(di,ii){state.days[di].items[ii].done=!state.days[di].items[ii].done;save();render();}
function editDay(idx){const d=state.days[idx];showSheet(`<h2>Edit Day</h2><div class="form"><label>Date<input id="edDate" type="date" value="${d.date}"></label><label>Place<input id="edPlace" value="${escapeAttr(d.place)}"></label><label>Staying<input id="edStay" value="${escapeAttr(d.stay||'')}"></label><label>Summary<textarea id="edSummary">${escapeHtml(d.summary||'')}</textarea></label><label>Activities <span class="small">One per line. Use "time | activity" format.</span><textarea id="edItems">${d.items.map(i=>`${i.time} | ${i.text}`).join('\n')}</textarea></label><div class="btn-row"><button class="btn" onclick="saveDay(${idx})">Save day</button><button class="btn secondary" onclick="closeSheet()">Cancel</button><button class="btn danger" onclick="deleteDay(${idx})">Delete</button></div></div>`)}
function saveDay(idx){state.days[idx]={date:val('edDate'),place:val('edPlace'),stay:val('edStay'),summary:val('edSummary'),items:parseItems(val('edItems'))};state.days.sort((a,b)=>a.date.localeCompare(b.date));save();closeSheet();render();}
function parseItems(txt){return txt.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>{let parts=line.split('|');return parts.length>1?{time:parts[0].trim(),text:parts.slice(1).join('|').trim(),done:false}:{time:'',text:line,done:false}})}
function addDay(){state.days.push({date:'2026-07-08',place:'New Day',stay:'',summary:'Add your plan.',items:[{time:'Day',text:'Add activity',done:false}]});save();render();editDay(state.days.length-1)}
function deleteDay(idx){if(confirm('Delete this day?')){state.days.splice(idx,1);save();closeSheet();render();}}
function saveJournal(){const idx=+val('journalDay');const text=val('journalText').trim();if(!text){alert('Add a note first.');return}const file=document.getElementById('journalPhoto').files[0];const add=(photo)=>{state.journal.push({date:state.days[idx].date,place:state.days[idx].place,text,photo:photo||'',created:new Date().toISOString()});save();renderJournal();alert('Journal entry saved.');};if(file){const r=new FileReader();r.onload=e=>add(e.target.result);r.readAsDataURL(file)}else add('');}
function editJournal(i){const j=state.journal[i];showSheet(`<h2>Edit Journal</h2><div class="form"><textarea id="ejText">${escapeHtml(j.text)}</textarea><div class="btn-row"><button class="btn" onclick="saveJournalEdit(${i})">Save</button><button class="btn secondary" onclick="closeSheet()">Cancel</button></div></div>`)}
function saveJournalEdit(i){state.journal[i].text=val('ejText');save();closeSheet();renderJournal();}
function deleteJournal(i){if(confirm('Delete this journal entry?')){state.journal.splice(i,1);save();renderJournal();}}
function openReservations(){showSheet(`<h2>Reservations</h2><div class="form"><input id="resTitle" placeholder="Reservation or ticket name"><input id="resDate" type="date"><textarea id="resNotes" placeholder="Confirmation number, address, notes, links..."></textarea><button class="btn" onclick="addReservation()">Save reservation</button></div><div id="resList">${reservationList()}</div><div class="btn-row"><button class="btn secondary" onclick="closeSheet()">Close</button></div>`)}
function reservationList(){return state.reservations.length?state.reservations.map((r,i)=>`<div class="journal-entry"><strong>${escapeHtml(r.title)}</strong><div class="small">${r.date||''}</div><p>${escapeHtml(r.notes).replace(/\n/g,'<br>')}</p><button class="btn danger" onclick="delReservation(${i})">Delete</button></div>`).join(''):'<div class="empty">No reservations saved yet.</div>'}
function addReservation(){state.reservations.push({title:val('resTitle'),date:val('resDate'),notes:val('resNotes')});save();openReservations();}
function delReservation(i){state.reservations.splice(i,1);save();openReservations();}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='waypoint-england-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importBackup(){const inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.days)throw Error('bad');state=data;save();render();alert('Backup restored.')}catch(err){alert('That backup file was not recognized.')}};r.readAsText(f)};inp.click()}
function resetTrip(){if(confirm('Reset local Waypoint England data on this device?')){localStorage.removeItem(STORE);state=seed();save();render();}}
function showSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('show')}
function closeSheet(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeSheet()});
function val(id){return document.getElementById(id).value}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}
